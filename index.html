<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout Log" />
  <meta name="theme-color" content="#0f0f13" />
  <title>Workout Log</title>

  <!-- Inline SVG favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f13'/><text y='.9em' font-size='80' x='10'>⚡</text></svg>" />

  <!-- Apple touch icon (inline base64 minimal) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f13'/><text y='.9em' font-size='80' x='10'>⚡</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f0f13;
      --bg2: #1a1a2e;
      --bg3: #13131f;
      --border: #2a2a4a;
      --accent: #e8ff47;
      --text: #f0ede8;
      --muted: #6b6b8a;
      --dim: #3a3a5a;
      --success: rgba(232,255,71,0.12);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body {
      font-family: 'DM Mono', 'Courier New', monospace;
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 14px) 20px 0;
      flex-shrink: 0;
    }
    .logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; margin-bottom: 14px; }
    .nav { display: flex; }
    .nav-btn {
      flex: 1; padding: 10px 0; background: none; border: none;
      border-bottom: 2px solid transparent; color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 12px;
      letter-spacing: 1.2px; text-transform: uppercase; cursor: pointer;
      transition: all .2s;
    }
    .nav-btn.active { border-bottom-color: var(--accent); color: var(--accent); }

    /* ── SCROLL CONTENT ── */
    .content {
      flex: 1; overflow-y: auto; padding: 20px 18px;
      padding-bottom: calc(var(--safe-bot) + 24px);
      -webkit-overflow-scrolling: touch;
    }

    /* ── DATE BAR ── */
    .date-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .date-center { text-align: center; }
    .date-label { font-size: 16px; font-weight: 600; }
    .today-badge {
      display: inline-block; background: var(--accent); color: var(--bg);
      font-size: 9px; letter-spacing: 1px; padding: 2px 7px;
      border-radius: 3px; font-weight: 700; text-transform: uppercase; margin-left: 8px;
      vertical-align: middle;
    }
    .arrow-btn {
      background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      width: 38px; height: 38px; border-radius: 10px; font-size: 20px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    /* ── STATS ── */
    .stats-bar { display: flex; gap: 10px; margin-bottom: 18px; }
    .stat-card {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 8px; text-align: center;
    }
    .stat-val { font-size: 19px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    /* ── EXERCISE CARD ── */
    .ex-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; margin-bottom: 14px; overflow: hidden;
    }
    .ex-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; border-bottom: 1px solid var(--border);
    }
    .ex-name { font-size: 14px; font-weight: 600; flex: 1; }
    .del-btn { background: none; border: none; color: var(--dim); font-size: 22px; cursor: pointer; padding: 0 2px; line-height: 1; }

    /* set rows */
    .col-labels {
      display: grid; grid-template-columns: 28px 1fr 1fr 38px 34px;
      gap: 6px; padding: 6px 14px; border-bottom: 1px solid #1a1a2a;
    }
    .col-lbl { font-size: 9px; color: var(--dim); text-align: center; text-transform: uppercase; letter-spacing: .5px; }
    .set-row {
      display: grid; grid-template-columns: 28px 1fr 1fr 38px 34px;
      gap: 6px; align-items: center; padding: 9px 14px;
      border-bottom: 1px solid #1a1a2a; transition: background .2s;
    }
    .set-row.done { background: var(--success); }
    .set-num { font-size: 11px; color: var(--dim); text-align: center; font-weight: 700; }
    .set-input {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); padding: 8px 4px; font-size: 15px; width: 100%;
      text-align: center; font-family: 'DM Mono', monospace; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .set-input:focus { border-color: var(--accent); }
    .check-btn {
      width: 34px; height: 34px; border-radius: 8px; border: 2px solid var(--border);
      background: transparent; color: transparent; cursor: pointer; font-size: 16px;
      font-weight: bold; display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .check-btn.done { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .rm-btn {
      width: 30px; height: 30px; border-radius: 7px; border: none; background: none;
      color: var(--dim); font-size: 22px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .add-set-btn {
      width: 100%; padding: 11px; background: none; border: none; color: var(--muted);
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
      font-family: 'DM Mono', monospace;
    }
    .last-session {
      padding: 8px 14px; font-size: 11px; color: var(--dim);
      background: var(--bg3); border-top: 1px solid var(--border);
      line-height: 1.5;
    }
    .last-session span { color: var(--muted); }

    /* ── ADD EXERCISE ── */
    .add-ex-section { margin-top: 4px; }
    .add-ex-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .add-ex-input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); padding: 13px 16px; font-size: 14px;
      font-family: 'DM Mono', monospace; outline: none; -webkit-appearance: none;
    }
    .add-ex-input:focus { border-color: var(--accent); }
    .add-ex-btn {
      background: var(--accent); border: none; border-radius: 12px; color: var(--bg);
      padding: 13px 20px; font-size: 22px; cursor: pointer; font-weight: bold; flex-shrink: 0;
    }
    .presets-toggle {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); padding: 8px 14px; font-size: 11px; cursor: pointer;
      font-family: 'DM Mono', monospace; letter-spacing: .5px; margin-bottom: 10px;
    }
    .presets-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .preset-chip {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
      color: #a0a0c0; padding: 7px 14px; font-size: 12px; cursor: pointer;
      font-family: 'DM Mono', monospace; transition: all .15s;
    }
    .preset-chip:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--dim); }
    .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-title { font-size: 14px; }
    .empty-sub { font-size: 12px; margin-top: 6px; color: var(--dim); }

    /* ── HISTORY ── */
    .hist-meta { font-size: 12px; color: var(--dim); margin-bottom: 18px; }
    .hist-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 12px; cursor: pointer; transition: border-color .2s;
    }
    .hist-card:active { border-color: var(--accent); }
    .hist-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .hist-date { font-size: 13px; color: var(--accent); font-weight: 600; }
    .hist-vol { font-size: 12px; color: var(--dim); }
    .hist-ex { font-size: 12px; color: var(--muted); margin-bottom: 4px; line-height: 1.4; }
    .hist-ex strong { color: #c0c0e0; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(var(--safe-bot) + 20px); left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--accent); color: var(--bg); padding: 10px 20px; border-radius: 20px;
      font-size: 12px; font-weight: 700; letter-spacing: .5px; transition: transform .3s ease;
      z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">⚡ WORKOUT LOG</div>
  <div class="nav">
    <button class="nav-btn active" id="btn-workout" onclick="switchView('workout')">Séance</button>
    <button class="nav-btn" id="btn-history" onclick="switchView('history')">Historique</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────
const PRESETS = [
  "Squat","Deadlift","Développé couché","Développé militaire",
  "Rowing barre","Tractions","Curl biceps","Triceps poulie",
  "Leg press","Fentes","Hip thrust","Élévations latérales",
  "Développé incliné","Tirage vertical","Rowing haltère","Mollets debout"
];

let currentView = 'workout';
let activeDate = todayKey();
let sessions = loadSessions();
let showPresets = false;

function todayKey() {
  return new Date().toISOString().split('T')[0];
}
function loadSessions() {
  try { return JSON.parse(localStorage.getItem('wl_sessions') || '{}'); } catch { return {}; }
}
function saveSessions() {
  localStorage.setItem('wl_sessions', JSON.stringify(sessions));
}
function getSession(date) {
  return sessions[date] || { exercises: [] };
}
function setSession(date, session) {
  sessions[date] = session;
  saveSessions();
}

// ── DATE UTILS ─────────────────────────────────────────────
function formatDate(str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
}
function navigateDate(dir) {
  const d = new Date(activeDate + 'T12:00:00');
  d.setDate(d.getDate() + dir);
  activeDate = d.toISOString().split('T')[0];
  render();
}

// ── VOLUME ─────────────────────────────────────────────────
function totalVolume(session) {
  return (session.exercises || []).reduce((s, ex) =>
    s + ex.sets.reduce((ss, set) =>
      ss + (parseFloat(set.weight) || 0) * (parseInt(set.reps) || 0), 0), 0);
}

// ── LAST SESSION DATA ───────────────────────────────────────
function getLastData(exerciseName) {
  const past = Object.keys(sessions)
    .filter(d => d < activeDate && sessions[d].exercises?.some(e => e.name === exerciseName))
    .sort().reverse();
  if (!past.length) return null;
  const ex = sessions[past[0]].exercises.find(e => e.name === exerciseName);
  return ex ? { date: past[0], sets: ex.sets } : null;
}

// ── MUTATIONS ───────────────────────────────────────────────
function addExercise(name) {
  name = name.trim();
  if (!name) return;
  const session = getSession(activeDate);
  session.exercises.push({ name, sets: [{ reps: '', weight: '', done: false }] });
  setSession(activeDate, session);
  document.getElementById('new-ex-input').value = '';
  showPresets = false;
  render();
  toast('Exercice ajouté !');
}
function addSet(exIdx) {
  const session = getSession(activeDate);
  const last = session.exercises[exIdx].sets.slice(-1)[0];
  session.exercises[exIdx].sets.push({ reps: last.reps, weight: last.weight, done: false });
  setSession(activeDate, session);
  render();
}
function removeSet(exIdx, setIdx) {
  const session = getSession(activeDate);
  session.exercises[exIdx].sets.splice(setIdx, 1);
  if (session.exercises[exIdx].sets.length === 0) session.exercises.splice(exIdx, 1);
  setSession(activeDate, session);
  render();
}
function removeExercise(exIdx) {
  if (!confirm('Supprimer cet exercice ?')) return;
  const session = getSession(activeDate);
  session.exercises.splice(exIdx, 1);
  setSession(activeDate, session);
  render();
}
function toggleDone(exIdx, setIdx) {
  const session = getSession(activeDate);
  const set = session.exercises[exIdx].sets[setIdx];
  set.done = !set.done;
  setSession(activeDate, session);
  renderSetRow(exIdx, setIdx, set);
}
function updateField(exIdx, setIdx, field, value) {
  const session = getSession(activeDate);
  session.exercises[exIdx].sets[setIdx][field] = value;
  setSession(activeDate, session);
}

// ── TOAST ───────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── RENDER HELPERS ──────────────────────────────────────────
function renderSetRow(exIdx, setIdx, set) {
  const row = document.getElementById(`set-${exIdx}-${setIdx}`);
  if (!row) return;
  row.className = 'set-row' + (set.done ? ' done' : '');
  const btn = document.getElementById(`check-${exIdx}-${setIdx}`);
  if (btn) btn.className = 'check-btn' + (set.done ? ' done' : '');
}

// ── VIEWS ───────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.getElementById('btn-workout').className = 'nav-btn' + (v === 'workout' ? ' active' : '');
  document.getElementById('btn-history').className = 'nav-btn' + (v === 'history' ? ' active' : '');
  render();
}

function render() {
  const content = document.getElementById('content');
  content.innerHTML = currentView === 'workout' ? renderWorkout() : renderHistory();
  attachWorkoutListeners();
}

function renderWorkout() {
  const session = getSession(activeDate);
  const today = todayKey();
  const doneSets = session.exercises.reduce((s, ex) => s + ex.sets.filter(se => se.done).length, 0);
  const totalSets = session.exercises.reduce((s, ex) => s + ex.sets.length, 0);
  const vol = totalVolume(session);

  let html = `
    <div class="date-bar">
      <button class="arrow-btn" onclick="navigateDate(-1)">‹</button>
      <div class="date-center">
        <span class="date-label">${formatDate(activeDate)}</span>
        ${activeDate === today ? '<span class="today-badge">Aujourd\'hui</span>' : ''}
      </div>
      <button class="arrow-btn" onclick="navigateDate(1)">›</button>
    </div>
  `;

  if (totalSets > 0) {
    html += `
      <div class="stats-bar">
        <div class="stat-card"><div class="stat-val">${session.exercises.length}</div><div class="stat-label">Exercices</div></div>
        <div class="stat-card"><div class="stat-val">${doneSets}/${totalSets}</div><div class="stat-label">Séries</div></div>
        <div class="stat-card"><div class="stat-val">${vol > 0 ? vol.toLocaleString('fr') : '—'}</div><div class="stat-label">Vol. kg</div></div>
      </div>
    `;
  }

  if (session.exercises.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🏋️</div><div class="empty-title">Aucun exercice</div><div class="empty-sub">Ajoute ton premier exercice ci-dessous</div></div>`;
  }

  session.exercises.forEach((ex, exIdx) => {
    const last = getLastData(ex.name);
    html += `
      <div class="ex-card">
        <div class="ex-header">
          <span class="ex-name">${escHtml(ex.name)}</span>
          <button class="del-btn" onclick="removeExercise(${exIdx})">×</button>
        </div>
        <div class="col-labels">
          <div class="col-lbl">#</div>
          <div class="col-lbl">Reps</div>
          <div class="col-lbl">Poids kg</div>
          <div class="col-lbl">✓</div>
          <div class="col-lbl"></div>
        </div>
    `;

    ex.sets.forEach((set, setIdx) => {
      html += `
        <div class="set-row${set.done ? ' done' : ''}" id="set-${exIdx}-${setIdx}">
          <div class="set-num">${setIdx + 1}</div>
          <input class="set-input" type="number" inputmode="decimal" min="0" placeholder="—"
            value="${escHtml(set.reps)}"
            onchange="updateField(${exIdx},${setIdx},'reps',this.value)" />
          <input class="set-input" type="number" inputmode="decimal" min="0" step="0.5" placeholder="—"
            value="${escHtml(set.weight)}"
            onchange="updateField(${exIdx},${setIdx},'weight',this.value)" />
          <button class="check-btn${set.done ? ' done' : ''}" id="check-${exIdx}-${setIdx}"
            onclick="toggleDone(${exIdx},${setIdx})">✓</button>
          <button class="rm-btn" onclick="removeSet(${exIdx},${setIdx})">−</button>
        </div>
      `;
    });

    html += `<button class="add-set-btn" onclick="addSet(${exIdx})">+ Ajouter une série</button>`;

    if (last) {
      const setsStr = last.sets.map(s => `${s.reps || '?'}×${s.weight || '?'}kg`).join(' · ');
      html += `<div class="last-session">Dernière fois (${formatDate(last.date)}) : <span>${escHtml(setsStr)}</span></div>`;
    }

    html += `</div>`;
  });

  // Add exercise section
  html += `
    <div class="add-ex-section">
      <div class="add-ex-row">
        <input class="add-ex-input" id="new-ex-input" type="text" placeholder="Nom de l'exercice..." />
        <button class="add-ex-btn" onclick="addExFromInput()">+</button>
      </div>
      <button class="presets-toggle" onclick="togglePresets()">
        ${showPresets ? '▲' : '▼'} Exercices fréquents
      </button>
      ${showPresets ? `
        <div class="presets-grid">
          ${PRESETS.map(name => `<button class="preset-chip" onclick="addExercise('${escHtml(name)}')">${escHtml(name)}</button>`).join('')}
        </div>
      ` : ''}
    </div>
  `;

  return html;
}

function renderHistory() {
  const dates = Object.keys(sessions)
    .filter(d => (sessions[d].exercises || []).length > 0)
    .sort().reverse();

  let html = `<div class="hist-meta">${dates.length} séance${dates.length !== 1 ? 's' : ''} enregistrée${dates.length !== 1 ? 's' : ''}</div>`;

  if (dates.length === 0) {
    html += `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Aucune séance</div><div class="empty-sub">Tes séances apparaîtront ici</div></div>`;
    return html;
  }

  dates.forEach(date => {
    const session = sessions[date];
    const vol = totalVolume(session);
    const today = todayKey();
    html += `
      <div class="hist-card" onclick="goToDate('${date}')">
        <div class="hist-top">
          <span class="hist-date">${formatDate(date)}${date === today ? ' · Aujourd\'hui' : ''}</span>
          ${vol > 0 ? `<span class="hist-vol">${vol.toLocaleString('fr')} kg</span>` : ''}
        </div>
        ${session.exercises.map(ex => `
          <div class="hist-ex">
            <strong>${escHtml(ex.name)}</strong> —
            ${ex.sets.map(s => `${s.reps || '?'}×${s.weight || '?'}kg`).join(' · ')}
          </div>
        `).join('')}
      </div>
    `;
  });

  return html;
}

function goToDate(date) {
  activeDate = date;
  switchView('workout');
}

function attachWorkoutListeners() {
  const input = document.getElementById('new-ex-input');
  if (input) {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addExFromInput(); }
    });
  }
}

function addExFromInput() {
  const input = document.getElementById('new-ex-input');
  if (input) addExercise(input.value);
}

function togglePresets() {
  showPresets = !showPresets;
  render();
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ────────────────────────────────────────────────────
render();

// ── SERVICE WORKER (inline) ─────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'wl-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['.'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ── WEB APP MANIFEST (injected) ─────────────────────────────
const manifest = {
  name: "Workout Log",
  short_name: "Workout",
  start_url: ".",
  display: "standalone",
  background_color: "#0f0f13",
  theme_color: "#0f0f13",
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f13'/><text y='.9em' font-size='80' x='10'>⚡</text></svg>",
    sizes: "any",
    type: "image/svg+xml"
  }]
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const mUrl = URL.createObjectURL(mBlob);
const mLink = document.createElement('link');
mLink.rel = 'manifest'; mLink.href = mUrl;
document.head.appendChild(mLink);
</script>
